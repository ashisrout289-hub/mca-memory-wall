<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our MCA Journey</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Our MCA Life 2024-2026</h1>
            <p>Final Batch Memories</p>
        </header>

        <!-- Final Batch Picture Section -->
        <section class="card">
            <h2>The Final Frame 🖼️</h2>
            <img src="{{ url_for('static', filename='final pic.jpg') }}" alt="Final Batch" style="width: 100%; border-radius: 15px;">
        </section>

        <!-- Video Gallery Section -->
        <section class="card">
            <h2>Memories in Motion 🎥</h2>
            <div class="video-grid">
                <p>Main Journey</p>
                <video controls width="100%"><source src="{{ url_for('static', filename='journy video.mp4') }}" type="video/mp4"></video>
                
                <p>Memory Snippet 1</p>
                <video controls width="100%"><source src="{{ url_for('static', filename='video 1.mp4') }}" type="video/mp4"></video>
                
                <p>Memory Snippet 2</p>
                <video controls width="100%"><source src="{{ url_for('static', filename='video2.mp4') }}" type="video/mp4"></video>
                
                <p>Memory Snippet 3</p>
                <video controls width="100%"><source src="{{ url_for('static', filename='video 3.mp4') }}" type="video/mp4"></video>
            </div>
        </section>

        <!-- Form Section -->
        <section class="card">
            <h2>Leave a Message</h2>
            <form action="/submit" method="post" enctype="multipart/form-data">
                <input type="text" name="name" placeholder="Your Name" required>
                <textarea name="about" placeholder="Write a memory..." required></textarea>
                <label>Upload a Photo: </label>
                <input type="file" name="photo">
                <button type="submit">Post Memory ❤️</button>
            </form>
        </section>
    </div>
</body>
</html>
