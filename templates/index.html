<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCA Family | 2024-2026</title>
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1a0a2e 0%, #3d0a25 50%, #0a0a0a 100%); color: white; overflow-x: hidden; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        .hero h1 { font-size: 3.5rem; background: linear-gradient(to right, #ff758c, #ff7eb3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 5px; }
        
        /* WORD-BY-WORD ANIMATION STYLING */
        .emotional-message { 
            background: rgba(255, 255, 255, 0.05); 
            border-left: 4px solid #ff758c; 
            padding: 30px; 
            margin: 30px 0; 
            font-size: 1.2rem; 
            line-height: 1.8; 
            border-radius: 0 20px 20px 0;
            min-height: 300px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px; /* Space between words */
        }

        .word {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            display: inline-block;
        }

        .word.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card { 
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); 
            padding: 30px; margin: 40px 0; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        h2 { color: #ff7eb3; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        img, video { width: 100%; border-radius: 15px; border: 2px solid #ff758c; margin-top: 15px; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; }
        
        button { background: linear-gradient(90deg, #ff758c, #ff7eb3); color: white; padding: 15px 30px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        
        .floating-heart { position: fixed; bottom: -50px; z-index: -1; animation: floatUp linear forwards; }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>MCA Family</h1>
            <p style="text-align:center; letter-spacing: 2px;">2024 — 2026</p>
        </div>

        <!-- THE WORD-BY-WORD CONTAINER -->
        <div class="emotional-message" id="word-container"></div>

        <div class="card">
            <h2>The Final Frame 📸</h2>
            <img src="/static/finalpic.jpg" alt="Final Batch Photo">
        </div>

        <div class="card">
            <h2>Memories in Motion 🎥</h2>
            <video controls><source src="/static/journyvideo.mp4" type="video/mp4"></video>
            <video controls><source src="/static/video1.mp4" type="video/mp4"></video>
            <video controls><source src="/static/video2.mp4" type="video/mp4"></video>
            <video controls><source src="/static/video3.mp4" type="video/mp4"></video>
        </div>

        <!-- STRICT UPLOAD SECTION -->
        <div class="card">
            <h2>Upload Your Best Memory ❤️</h2>
            <p style="color: #ff758c; font-size: 0.8rem;">* All fields are mandatory (Name, Message, and Photo)</p>
            <form action="/submit" method="post" enctype="multipart/form-data">
                <input type="text" name="name" placeholder="Your Name" required>
                <textarea name="about" placeholder="Write your heartfelt message..." rows="5" required></textarea>
                <p style="font-size: 0.9rem; margin-top: 10px;">Select your memory photo:</p>
                <input type="file" name="photo" accept="image/*" required>
                <button type="submit">Post to the Wall</button>
            </form>
        </div>
    </div>

    <script>
        const fullText = "It all started with awkward first meetings, unknown faces and names, but slowly those strangers became friends and then turned into family. From simple “hi” to calling each other bhai and yaar, we never realized when the bond became so strong. The endless masti, backchodi and laughter in classrooms made every day unforgettable. We had our share of jhagde, but they never lasted long because our friendship was stronger. Group studies that turned into gossip, last-minute assignments, proxy attendance, and exam stress with last-night preparation—somehow we managed everything together. From fun moments and celebrations to helping each other in tough times, every memory became special. And now, as this journey ends, it’s hard to accept that these moments will never come back. We came as strangers in 2024, but we leave in 2026 as a family, carrying a lifetime of memories in our hearts.LOVE YOU GUYS (CR GAY) 💔✨";

        const container = document.getElementById('word-container');
        const words = fullText.split(" ");

        function animateWords() {
            words.forEach((word, index) => {
                const span = document.createElement('span');
                span.classList.add('word');
                span.innerText = word;
                container.appendChild(span);

                // This triggers each word every 150ms for a "typing" effect
                setTimeout(() => {
                    span.classList.add('visible');
                }, index * 150); 
            });
        }

        window.onload = animateWords;

        // Background Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 1.5 + 1) + "rem";
            heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 600);
    </script>
</body>
</html>
