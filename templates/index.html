<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our MCA Journey</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation-container"></div>

    <audio id="bgMusic" loop>
        <source src="{{ url_for('static', filename='background-track.mp3') }}" type="audio/mpeg">
    </audio>

    <header class="hero">
        <h1>Our MCA Life: The Final Chapter</h1>
    </header>

    <main class="container">
        <section class="card">
            <h2>To My Friends</h2>
            <p id="animated-message" class="loving-text"></p>
        </section>

        <section class="card">
            <h2>Our Favorite Moment</h2>
            <div class="img-container">
                <img src="{{ url_for('static', filename='test-photo.jpg.PNG') }}" alt="MCA Memory">
            </div>
        </section>

        <section class="card">
            <h2>Memories in Motion</h2>
            <div class="video-container">
                <video id="mainVideo" controls width="100%">
                    <source src="{{ url_for('static', filename='journey-video.mp4') }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </section>

        <section class="card">
            <h2>Leave Your Mark</h2>
            <form id="journeyForm" action="/submit" method="POST" enctype="multipart/form-data">
                <div class="form-step active" id="step1">
                    <p>What is your name?</p>
                    <input type="text" name="name" placeholder="Your name..." required>
                    <button type="button" onclick="nextStep(2)">Next ❤️</button>
                </div>
                <div class="form-step" id="step2" style="display:none;">
                    <p>Your message:</p>
                    <textarea name="about" placeholder="Write something sweet..." required></textarea>
                    <button type="button" onclick="nextStep(3)">Next ✨</button>
                </div>
                <div id="step3" class="form-step" style="display:none;">
                    <p>Upload a memory:</p>
                    <input type="file" name="photo" accept="image/*" required>
                    <button type="submit">Save Forever 💖</button>
                </div>
            </form>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
